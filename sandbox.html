function cx(...classes) {
  return classes.filter(Boolean).join(" ");
}

    Complete: "bg-emerald-50 text-emerald-700 border-emerald-200",
    Verified: "bg-emerald-50 text-emerald-700 border-emerald-200",
    "No action": "bg-emerald-50 text-emerald-700 border-emerald-200",
    Partial: "bg-amber-50 text-amber-700 border-amber-200",
    "Needs review": "bg-amber-50 text-amber-700 border-amber-200",
    "Needs evidence": "bg-rose-50 text-rose-700 border-rose-200",
    "In progress": "bg-sky-50 text-sky-700 border-sky-200",
    "Declared compliant": "bg-emerald-50 text-emerald-700 border-emerald-200",
    Monitor: "bg-amber-50 text-amber-700 border-amber-200",
    "To assess": "bg-slate-100 text-slate-700 border-slate-200",
  };
  return (
    <span className={cx("inline-flex items-center rounded-full border px-2.5 py-1 text-xs font-semibold", styles[status] || "bg-slate-100 text-slate-700 border-slate-200")}>

  );
